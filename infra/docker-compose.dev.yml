# ┌─────────────────────────────────────────────────────────────────┐
# │  Développement local — infrastructure uniquement                │
# │  Lance : PostgreSQL, Redis, MinIO, Mailpit                      │
# │  L'application (bun dev) tourne sur le host, pas dans Docker   │
# │  Usage  : make dev  (ou docker compose -f infra/docker-compose.dev.yml up -d) │
# └─────────────────────────────────────────────────────────────────┘

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-reviewskits}
    ports:
      - "5433:5432"
    volumes:
      - db-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis-dev-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"   # Console Minio → http://localhost:9001
    volumes:
      - minio-dev-data:/data

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI → http://localhost:8025
    environment:
      MP_MAX_MESSAGES: 100

volumes:
  db-dev-data:
  redis-dev-data:
  minio-dev-data: