<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reviewskits — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}

:root{
  --bg:       #0A0A0F;
  --bg2:      #111118;
  --bg3:      #16161F;
  --teal:     #0D9E75;
  --teal-dim: rgba(13,158,117,.12);
  --teal-glow:rgba(13,158,117,.25);
  --border:   rgba(255,255,255,.07);
  --border2:  rgba(255,255,255,.12);
  --text:     #F2F0EB;
  --muted:    #6E6C7A;
  --muted2:   #9896A4;
  --red:      #E05454;
  --red-dim:  rgba(224,84,84,.1);
  --yellow:   #F4B730;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',-apple-system,sans-serif;
  line-height:1.6;
  overflow-x:hidden;
  min-height:100vh;
}

/* ── NOISE OVERLAY ── */
body::after{
  content:'';
  position:fixed;inset:0;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;opacity:.5;
}

/* ── TOPBAR ── */
#topbar{
  position:sticky;top:0;z-index:200;
  height:64px;
  display:flex;align-items:center;
  border-bottom:1px solid var(--border);
  background:rgba(10,10,15,.9);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
}
.nav-inner{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;max-width:1140px;margin:0 auto;padding:0 24px;
  position:relative;z-index:1;
}
.nav-logo{
  display:flex;align-items:center;gap:8px;
  font-size:17px;font-weight:700;letter-spacing:-.02em;
  text-decoration:none;color:var(--text);
}
.nav-logo-icon{
  width:28px;height:28px;border-radius:7px;
  background:var(--teal);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;box-shadow:0 0 16px var(--teal-glow);
}
.nav-right{display:flex;align-items:center;gap:10px}
.search-box{
  display:flex;align-items:center;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;padding:7px 12px;gap:8px;width:210px;
  transition:border-color .2s;
}
.search-box:focus-within{border-color:var(--border2)}
.search-box input{
  background:transparent;border:none;outline:none;
  font-size:13px;color:var(--muted2);width:100%;font-family:inherit;
}
.icon-btn{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;padding:8px;cursor:pointer;
  position:relative;display:flex;align-items:center;justify-content:center;
  transition:border-color .2s;color:var(--muted2);
}
.icon-btn:hover{border-color:var(--border2);color:var(--text)}
.notif-dot{
  position:absolute;top:6px;right:6px;
  width:5px;height:5px;background:var(--red);
  border-radius:50%;border:1.5px solid var(--bg2);
}
.user-pill{
  display:flex;align-items:center;gap:9px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:99px;padding:5px 14px 5px 5px;
  cursor:pointer;transition:border-color .2s;
}
.user-pill:hover{border-color:var(--border2)}
.user-av{
  width:30px;height:30px;border-radius:50%;
  background:linear-gradient(135deg,#0D9E75,#0a6e52);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;flex-shrink:0;
}
.user-name{font-size:13px;font-weight:600;color:var(--text)}

/* ── MAIN ── */
.main{max-width:1140px;margin:0 auto;padding:48px 24px 80px;position:relative;z-index:1}

/* ── PAGE HEADER ── */
.page-header{margin-bottom:40px}
.section-label{
  font-size:12px;font-weight:600;letter-spacing:.12em;
  text-transform:uppercase;color:var(--teal);
  margin-bottom:10px;display:block;
}
.page-title{
  font-size:clamp(26px,3vw,36px);font-weight:800;
  letter-spacing:-.03em;line-height:1.1;
  margin-bottom:8px;
}
.page-sub{font-size:15px;color:var(--muted2);font-weight:400}

/* ── STATS GRID ── */
.stats-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:16px;margin-bottom:56px;
}
.stat-card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:14px;padding:24px;
  position:relative;overflow:hidden;
  transition:border-color .2s,transform .2s;
  cursor:default;
}
.stat-card::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(13,158,117,.4),transparent);
  opacity:0;transition:opacity .3s;
}
.stat-card:hover{border-color:rgba(13,158,117,.25);transform:translateY(-2px)}
.stat-card:hover::before{opacity:1}
.stat-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.stat-icon{
  width:40px;height:40px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:18px;
  border:1px solid;
}
.stat-delta{
  font-size:11px;font-weight:700;letter-spacing:.02em;
  color:var(--teal);background:var(--teal-dim);
  padding:3px 9px;border-radius:999px;
  border:1px solid rgba(13,158,117,.2);
  display:flex;align-items:center;gap:3px;
}
.stat-value{
  font-size:32px;font-weight:900;letter-spacing:-.04em;
  color:var(--text);line-height:1;margin-bottom:5px;
}
.stat-label{font-size:13px;color:var(--muted2);font-weight:500}

/* ── SECTION DIVIDER ── */
.section-divider{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:24px;
}
.section-divider-left{display:flex;align-items:center;gap:10px}
.forms-count-badge{
  font-size:11px;font-weight:600;
  background:var(--bg3);border:1px solid var(--border2);
  color:var(--muted2);padding:3px 10px;border-radius:999px;
}

/* ── BTN PRIMARY ── */
.btn-primary{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--teal);color:#fff;
  font-size:14px;font-weight:600;
  padding:11px 22px;border-radius:9px;
  text-decoration:none;cursor:pointer;border:none;font-family:inherit;
  position:relative;overflow:hidden;
  transition:transform .15s,box-shadow .2s;
}
.btn-primary::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.2) 50%,transparent 100%);
  transform:translateX(-100%);transition:transform .6s;
}
.btn-primary:hover::after{transform:translateX(100%)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px var(--teal-glow)}

/* ── FORMS GRID ── */
.forms-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:20px;
}

/* ── FORM CARD ── */
.form-card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:16px;padding:26px;
  cursor:pointer;
  position:relative;overflow:hidden;
  transition:border-color .2s,transform .25s,box-shadow .25s;
}
.form-card::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(13,158,117,.5),transparent);
  opacity:0;transition:opacity .3s;
}
.form-card:hover{
  border-color:rgba(13,158,117,.3);
  transform:translateY(-4px);
  box-shadow:0 20px 50px rgba(0,0,0,.4),0 0 0 1px rgba(13,158,117,.1);
}
.form-card:hover::before{opacity:1}

.fc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.fc-icon{
  width:42px;height:42px;border-radius:10px;
  background:var(--teal-dim);border:1px solid rgba(13,158,117,.2);
  display:flex;align-items:center;justify-content:center;font-size:18px;
}
.fc-menu{
  background:none;border:none;cursor:pointer;
  color:var(--muted);font-size:18px;padding:3px 7px;
  border-radius:7px;transition:.15s;line-height:1;font-family:inherit;
}
.fc-menu:hover{color:var(--text);background:rgba(255,255,255,.06)}

.fc-name{
  font-size:15px;font-weight:700;letter-spacing:-.02em;
  color:var(--text);margin-bottom:5px;line-height:1.3;
}
.fc-date{font-size:12px;color:var(--muted);margin-bottom:14px}

.badge-active{
  display:inline-flex;align-items:center;gap:5px;
  font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  padding:4px 10px;border-radius:999px;
  background:var(--teal-dim);color:var(--teal);
  border:1px solid rgba(13,158,117,.3);margin-bottom:18px;
}
.badge-active::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--teal);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.badge-draft{
  display:inline-flex;align-items:center;gap:5px;
  font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  padding:4px 10px;border-radius:999px;
  background:rgba(255,255,255,.05);color:var(--muted2);
  border:1px solid var(--border2);margin-bottom:18px;
}
.badge-draft::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--muted)}

/* mini stats 3-col */
.fc-stats{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:8px;margin-bottom:18px;
}
.fc-stat{
  background:var(--bg);border:1px solid var(--border);
  border-radius:10px;padding:10px 12px;
}
.fc-stat-val{font-size:17px;font-weight:800;letter-spacing:-.02em;color:var(--text);line-height:1}
.fc-stat-lbl{font-size:10px;color:var(--muted);margin-top:3px;font-weight:500}

/* stars teal like landing */
.stars-row{display:flex;align-items:center;gap:4px;margin-bottom:14px}
.stars{color:var(--teal);font-size:13px;letter-spacing:2px}
.stars-val{font-size:12px;font-weight:600;color:var(--text);margin-left:2px}

/* completion bar */
.comp-row{display:flex;align-items:center;gap:10px}
.comp-lbl{font-size:11px;color:var(--muted);font-weight:500;flex-shrink:0}
.comp-track{flex:1;height:3px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}
.comp-fill{height:100%;background:var(--teal);border-radius:99px}
.comp-pct{font-size:11px;color:var(--muted2);font-weight:600;flex-shrink:0;width:28px;text-align:right}

/* ── ADD CARD ── */
.add-card{
  background:transparent;
  border:1px dashed rgba(255,255,255,.1);
  border-radius:16px;padding:26px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:240px;gap:14px;
  font-size:14px;font-weight:500;color:var(--muted);
  font-family:inherit;
  transition:border-color .2s,background .2s,color .2s;
}
.add-card:hover{
  border-color:rgba(13,158,117,.4);
  background:rgba(13,158,117,.03);
  color:var(--teal);
}
.add-icon{
  width:48px;height:48px;border-radius:50%;
  border:1.5px dashed currentColor;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;transition:transform .2s;
}
.add-card:hover .add-icon{transform:scale(1.1) rotate(90deg)}

/* ── DETAIL VIEW ── */
.back-btn{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;padding:9px 16px;
  font-size:13px;font-weight:500;color:var(--muted2);
  cursor:pointer;font-family:inherit;
  transition:color .15s,border-color .15s;
  margin-bottom:28px;
}
.back-btn:hover{color:var(--text);border-color:var(--border2)}

/* detail stats */
.detail-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}

/* chart area */
.chart-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:14px;padding:24px;
}
.chart-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px}
.chart-sub{font-size:12px;color:var(--muted2);margin-bottom:20px}
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:120px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%}
.bar{
  width:100%;border-radius:3px 3px 0 0;
  background:rgba(13,158,117,.25);
  margin-top:auto;transition:background .15s;cursor:pointer;
}
.bar:hover{background:var(--teal)}
.bar-lbl{font-size:8px;color:var(--muted);text-align:center}

/* star breakdown */
.sb-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sb-lbl{font-size:12px;color:var(--muted2);width:28px;flex-shrink:0}
.sb-track{flex:1;background:rgba(255,255,255,.06);border-radius:99px;height:5px;overflow:hidden}
.sb-fill{height:100%;border-radius:99px}
.sb-n{font-size:11px;color:var(--muted2);width:22px;text-align:right;flex-shrink:0}

/* reviews list */
.rev-list-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.rev-list-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:18px 22px;border-bottom:1px solid var(--border);
}
.rev-list-title{font-size:15px;font-weight:700;color:var(--text)}
.rev-list-link{font-size:12px;font-weight:600;color:var(--teal);background:none;border:none;cursor:pointer;font-family:inherit}
.rev-item{display:flex;gap:14px;padding:16px 22px;border-bottom:1px solid var(--border)}
.rev-item:last-child{border-bottom:none}
.rev-av{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;flex-shrink:0;
}
.rev-author{font-size:13px;font-weight:600;color:var(--text)}
.rev-date{font-size:11px;color:var(--muted)}
.rev-text{font-size:13px;color:var(--muted2);line-height:1.6;margin-top:4px}

/* teal text */
.teal{color:var(--teal)}

/* two col grid */
.two-col{display:grid;grid-template-columns:1fr 300px;gap:20px;margin-bottom:24px}

@media(max-width:960px){
  .stats-grid{grid-template-columns:1fr 1fr}
  .forms-grid{grid-template-columns:1fr 1fr}
  .detail-stats{grid-template-columns:1fr 1fr}
  .two-col{grid-template-columns:1fr}
}
@media(max-width:600px){
  .forms-grid{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:1fr 1fr}
  .main{padding:32px 16px 60px}
  .nav-inner{padding:0 16px}
  .search-box{display:none}
}
</style>
</head>

const STAR_DATA=[{s:5,n:68,c:"#0D9E75"},{s:4,n:42,c:"#0a7d5c"},{s:3,n:18,c:"#ca8a04"},{s:2,n:9,c:"#ea580c"},{s:1,n:5,c:"#e84040"}];
const REVS=[
  {av:"SM",name:"Sophie M.",bg:"linear-gradient(135deg,#0D9E75,#0a6e52)",r:5,date:"2h",txt:"Absolutely love the new interface. Clean, fast, and intuitive. Best review tool I've used."},
  {av:"TR",name:"Théo R.",  bg:"linear-gradient(135deg,#7c3aed,#4f46e5)",r:4,date:"5h",txt:"Really solid product. Would love to see better CSV export options in the next release."},
  {av:"CD",name:"Camille D.",bg:"linear-gradient(135deg,#f59e0b,#d97706)",r:5,date:"1j",txt:"Switched from Typeform and never looked back. The analytics view alone is worth it."},
  {av:"LB",name:"Lucas B.", bg:"linear-gradient(135deg,#e05454,#c03030)",r:3,date:"2j",txt:"Good overall, but the mobile experience needs some polish. Desktop is flawless though."},

function starsHTML(r, sz=13){
  const n = Math.round(r);
  return `<span class="stars" style="font-size:${sz}px">${'★'.repeat(n)}${'★'.repeat(5-n).replace(/★/g,'<span style="color:var(--bg3)">★</span>')}</span>`;
}

function starsStr(r){
  return '★'.repeat(Math.round(r));
}

function renderForms(){
  document.getElementById('forms-count-badge').textContent = FORMS.length + ' formulaires';
  document.getElementById('forms-grid').innerHTML =
    FORMS.map(f=>`
      <div class="form-card" onclick="openDetail(${f.id})">
        <div class="fc-header">
          <div class="fc-icon">📋</div>
          <button class="fc-menu" onclick="event.stopPropagation()">⋯</button>
        </div>
        <div class="fc-name">${f.name}</div>
        <div class="fc-date">Créé le ${f.created}</div>
        <span class="${f.status==='active'?'badge-active':'badge-draft'}">${f.status==='active'?'Actif':'Brouillon'}</span>
        <div class="fc-stats">
          <div class="fc-stat">
            <div class="fc-stat-val">${f.responses}</div>
            <div class="fc-stat-lbl">Réponses</div>
          </div>
          <div class="fc-stat">
            <div class="fc-stat-val">${f.rating||'—'}</div>
            <div class="fc-stat-lbl">Note moy.</div>
          </div>
          <div class="fc-stat">
            <div class="fc-stat-val">${f.completion}%</div>
            <div class="fc-stat-lbl">Complétion</div>
          </div>
        </div>
        ${f.rating
          ? `<div class="stars-row"><span class="stars">${starsStr(f.rating)}</span><span class="stars-val">${f.rating} / 5</span></div>`
          : `<div style="height:24px;margin-bottom:14px"></div>`
        }
        <div class="comp-row">
          <span class="comp-lbl">Complétion</span>
          <div class="comp-track"><div class="comp-fill" style="width:${f.completion}%"></div></div>
          <span class="comp-pct">${f.completion}%</span>
        </div>
      </div>
    `).join('') +
    `<div class="add-card" onclick="openAddModal()">
       <div class="add-icon">+</div>
       <span>Nouveau formulaire</span>
     </div>`;
}

function openDetail(id){
  const f = FORMS.find(x=>x.id===id);
  document.getElementById('dashboard-view').style.display='none';
  document.getElementById('detail-view').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
  const tot = STAR_DATA.reduce((a,b)=>a+b.n,0);

  document.getElementById('detail-content').innerHTML=`

    <!-- detail header -->
    <div style="margin-bottom:28px">
      <span class="section-label">// formulaire</span>
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px">
        <div>
          <div style="font-size:clamp(20px,2.5vw,28px);font-weight:800;letter-spacing:-.03em;color:var(--text);margin-bottom:8px">${f.name}</div>
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <span class="${f.status==='active'?'badge-active':'badge-draft'}" style="margin-bottom:0">${f.status==='active'?'Actif':'Brouillon'}</span>
            ${f.rating?`<div style="display:flex;align-items:center;gap:4px"><span class="stars" style="font-size:13px">${starsStr(f.rating)}</span><span style="font-size:13px;font-weight:600;color:var(--text)">${f.rating}</span></div>`:''}
          </div>
        </div>
        <button class="btn-primary">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          Partager le formulaire
        </button>
      </div>
    </div>

    <!-- 4 stats -->
    <div class="detail-stats">
      <div class="stat-card">
        <div class="stat-card-top"><div class="stat-icon" style="background:var(--teal-dim);border-color:rgba(13,158,117,.2)">💬</div><span class="stat-delta">↑ +12%</span></div>
        <div class="stat-value">${f.responses}</div><div class="stat-label">Total reviews</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-top"><div class="stat-icon" style="background:rgba(14,165,233,.1);border-color:rgba(14,165,233,.2)">📈</div><span class="stat-delta">↑ +4%</span></div>
        <div class="stat-value">${f.completion}%</div><div class="stat-label">Complétion</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-top"><div class="stat-icon" style="background:rgba(244,183,48,.1);border-color:rgba(244,183,48,.2)">⭐</div></div>
        <div class="stat-value">${f.rating||'—'}</div><div class="stat-label">Note moyenne</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-top"><div class="stat-icon" style="background:rgba(168,85,247,.1);border-color:rgba(168,85,247,.2)">👥</div></div>
        <div class="stat-value">${Math.round(f.responses*.87)}</div><div class="stat-label">Répondants uniques</div>
      </div>
    </div>

    <!-- chart + breakdown -->
    <div class="two-col">
      <div class="chart-card">
        <div class="chart-title">Volume de reviews</div>
        <div class="chart-sub">12 dernières semaines</div>
        <div class="bar-chart">
          ${BARS.map((v,i)=>`
            <div class="bar-col">
              <div class="bar" style="height:${Math.round(v/MAX*100)}%"></div>
              <div class="bar-lbl">${LBLS[i]}</div>
            </div>`).join('')}
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Répartition des notes</div>
        <div class="chart-sub">${tot} reviews au total</div>
        ${STAR_DATA.map(s=>`
          <div class="sb-row">
            <span class="sb-lbl">${s.s} ★</span>
            <div class="sb-track"><div class="sb-fill" style="width:${Math.round(s.n/tot*100)}%;background:${s.c}"></div></div>
            <span class="sb-n">${s.n}</span>
          </div>`).join('')}
        <div style="display:flex;align-items:center;gap:12px;padding-top:16px;border-top:1px solid var(--border);margin-top:8px">
          <span style="font-size:36px;font-weight:900;letter-spacing:-.04em;color:var(--text)">${f.rating}</span>
          <div>
            <span class="stars" style="font-size:14px">${starsStr(f.rating)}</span>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">sur 5</div>
          </div>
        </div>
      </div>
    </div>

    <!-- reviews list -->
    <div class="rev-list-card">
      <div class="rev-list-header">
        <span class="rev-list-title">// derniers avis reçus</span>
        <button class="rev-list-link">Voir tous les avis →</button>
      </div>
      ${REVS.map(r=>`
        <div class="rev-item">
          <div class="rev-av" style="background:${r.bg}">${r.av}</div>
          <div style="flex:1">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;flex-wrap:wrap;gap:6px">
              <div style="display:flex;align-items:center;gap:8px">
                <span class="rev-author">${r.name}</span>
                <span class="stars" style="font-size:11px">${starsStr(r.r)}</span>
              </div>
              <span class="rev-date">${r.date} ago</span>
            </div>
            <div class="rev-text">${r.txt}</div>
          </div>
        </div>`).join('')}
    </div>
  `;
}

function showDashboard(){
  document.getElementById('dashboard-view').style.display='block';
  document.getElementById('detail-view').style.display='none';
  window.scrollTo({top:0,behavior:'smooth'});
}

function openAddModal(){
  // placeholder — à connecter à l'API
  alert('✦ Nouveau formulaire — à connecter à ton backend 🚀');
}

renderForms();
</script>
</body>
</html>
